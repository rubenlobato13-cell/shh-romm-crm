<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CRM SHH ROOM — Control de pagos</title>
<style>
:root{
  --verde:#22c55e;--verde-bg:#052e16;--verde-dark:#4ade80;
  --rojo:#ff3333;--rojo-bg:#2a0000;--rojo-dark:#ff6b6b;
  --ambar:#f59e0b;--ambar-bg:#1c1200;--ambar-dark:#fbbf24;
  --azul:#cc0000;--azul-dark:#ff1a1a;--azul-bg:#1a0000;
  --gris:#6b7280;--gris-bg:#1e1e1e;
  --fondo:#0a0a0a;--blanco:#161616;
  --borde:#2a2a2a;--texto:#f0f0f0;--suave:#9ca3af;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--fondo);color:var(--texto);min-height:100vh;}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:#cc0000;border-radius:3px;}
/* LOGIN */
.login-ov{display:flex;position:fixed;top:0;right:0;bottom:0;left:0;background:#000;z-index:999;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
.login-ov::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at top,rgba(180,0,0,.18) 0%,transparent 65%);pointer-events:none;}
.login-box{width:100%;max-width:340px;position:relative;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo-img{width:90px;height:135px;margin:0 auto 4px;display:block;filter:drop-shadow(0 0 12px rgba(204,0,0,.45));}
.login-logo-img svg{display:block;}
.login-logo h1{color:#fff;font-size:1.35rem;font-weight:800;margin-top:6px;letter-spacing:.08em;}
.login-logo h1 em{color:#cc0000;font-style:normal;}
.login-logo p{color:#666;font-size:.78rem;margin-top:4px;letter-spacing:.12em;text-transform:uppercase;}
.hdr-logo-img{width:38px;height:57px;display:inline-flex;align-items:center;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(204,0,0,.5));}
.hdr-logo-img svg{display:block;}
.user-cards{display:flex;flex-direction:column;gap:9px;}
.ucard{background:rgba(204,0,0,.08);border:1.5px solid rgba(204,0,0,.3);border-radius:13px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;width:100%;text-align:left;}
.ucard:hover,.ucard:active{background:rgba(204,0,0,.18);border-color:#cc0000;transform:translateY(-1px);}
.ucard-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;color:#fff;flex-shrink:0;border:1.5px solid rgba(255,255,255,.2);}
.ucard-nm{color:#fff;font-weight:700;font-size:.95rem;}
.ucard-rl{font-size:.72rem;margin-top:2px;}
.rl-admin{color:#ff6b6b;}
.rl-trab{color:#86efac;}
.pin-hdr{text-align:center;margin-bottom:18px;}
.pin-hdr .pnom{color:#fff;font-size:1.1rem;font-weight:700;}
.pin-hdr .psub{color:#94a3b8;font-size:.8rem;margin-top:3px;}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:0 0 10px;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:rgba(204,0,0,.15);border:2px solid rgba(204,0,0,.4);transition:all .18s;}
.pin-dot.on{background:#cc0000;border-color:#ff3333;transform:scale(1.2);box-shadow:0 0 8px rgba(204,0,0,.6);}
.pin-err{color:#ff6b6b;text-align:center;font-size:.8rem;min-height:20px;margin-bottom:8px;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:230px;margin:0 auto;}
.pkey{background:rgba(204,0,0,.1);border:1.5px solid rgba(204,0,0,.3);color:#fff;border-radius:11px;padding:15px 8px;font-size:1.2rem;font-weight:700;cursor:pointer;transition:all .15s;min-height:54px;}
.pkey:hover,.pkey:active{background:rgba(204,0,0,.28);border-color:#cc0000;}
.pkey.sec{font-size:.8rem;background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);}
/* HEADER */
.hdr{background:#000;color:#fff;padding:11px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;box-shadow:0 2px 0 #cc0000,0 4px 20px rgba(204,0,0,.2);border-bottom:2px solid #cc0000;}
.hdr-logo{display:flex;align-items:center;gap:12px;}
.hdr-title{font-size:1.15rem;font-weight:900;letter-spacing:.06em;}
.hdr-title em{color:#cc0000;font-style:normal;}
.hdr-title span{color:#666;font-size:.72rem;font-weight:400;display:block;margin-top:1px;letter-spacing:.1em;text-transform:uppercase;}
.mes-nav{display:flex;align-items:center;gap:7px;}
.mes-nav button{background:rgba(204,0,0,.12);border:1px solid rgba(204,0,0,.35);color:#fff;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:.82rem;transition:all .2s;}
.mes-nav button:hover{background:rgba(204,0,0,.3);border-color:#cc0000;}
.mes-lbl{background:rgba(204,0,0,.08);border-radius:8px;padding:7px 16px;font-size:.93rem;font-weight:700;border:1px solid rgba(204,0,0,.3);min-width:155px;text-align:center;color:#fff;}
.hdr-usr{display:none;background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.35);border-radius:9px;padding:6px 12px;font-size:.82rem;color:#fff;align-items:center;gap:8px;flex-shrink:0;}
.btn-salir{background:#cc0000;border:none;color:#fff;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.72rem;min-height:28px;}
.btn-salir:hover{background:#ff1a1a;}
/* TABS */
.tabs-wrap{background:#111;border-bottom:1px solid #2a2a2a;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs{display:flex;padding:0 10px;gap:2px;min-width:max-content;}
.tab{padding:10px 13px;cursor:pointer;border-bottom:3px solid transparent;font-size:.82rem;font-weight:500;color:#666;transition:all .2s;white-space:nowrap;user-select:none;display:flex;align-items:center;min-height:44px;}
.tab:hover{color:#cc0000;background:rgba(204,0,0,.08);border-radius:6px 6px 0 0;}
.tab.active{color:#fff;border-bottom-color:#cc0000;font-weight:700;}
.badge{display:inline-flex;align-items:center;justify-content:center;border-radius:10px;padding:1px 6px;font-size:.68rem;margin-left:5px;font-weight:700;}
.badge.r{background:var(--rojo);color:#fff;}
.badge.a{background:var(--ambar);color:#fff;}
.badge.v{background:var(--verde);color:#fff;}
.main{padding:16px 18px;}
.view{display:none;}
.view.active{display:block;}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:18px;}
.stat{background:#161616;border-radius:11px;padding:14px;box-shadow:0 1px 8px rgba(0,0,0,.5);border-left:4px solid var(--azul);border:1px solid #222;border-left:4px solid var(--azul);}
.stat.v{border-left-color:var(--verde);}
.stat.r{border-left-color:var(--rojo);}
.stat.a{border-left-color:var(--ambar);}
.stat .lbl{font-size:.7rem;color:var(--suave);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.stat .val{font-size:1.55rem;font-weight:800;}
.stat .sub{font-size:.71rem;color:var(--suave);margin-top:2px;}
.pisos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;}
.piso-card{background:#161616;border-radius:11px;padding:14px;box-shadow:0 1px 8px rgba(0,0,0,.5);cursor:pointer;transition:all .2s;border:1px solid #222;}
.piso-card:hover{border-color:#cc0000;transform:translateY(-2px);box-shadow:0 4px 20px rgba(204,0,0,.15);}
.piso-card h3{font-size:.93rem;font-weight:700;margin-bottom:9px;}
.prog-bar{height:7px;background:var(--gris-bg);border-radius:4px;overflow:hidden;margin-bottom:5px;}
.prog-fill{height:100%;border-radius:4px;transition:width .4s;}
.prog-fill.contab{background:var(--verde);}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
.chip{padding:3px 8px;border-radius:14px;font-size:.7rem;font-weight:600;}
.chip.c{background:var(--verde-bg);color:var(--verde-dark);}
.chip.r{background:var(--ambar-bg);color:var(--ambar-dark);}
.chip.n{background:var(--rojo-bg);color:var(--rojo-dark);}
.chip.v{background:var(--gris-bg);color:var(--gris);}
.piso-footer{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--borde);font-size:.76rem;flex-wrap:wrap;gap:4px;}
.piso-vhdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.piso-vtitle{font-size:1.15rem;font-weight:800;}
.piso-vsub{font-size:.79rem;color:var(--suave);margin-top:3px;}
.btns-row{display:flex;gap:7px;flex-wrap:wrap;}
.btn-green{background:var(--verde);color:#fff;border:none;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:.79rem;font-weight:600;min-height:36px;}
.btn-green:hover{background:var(--verde-dark);}
.btn-ambar{background:var(--ambar);color:#fff;border:none;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:.79rem;font-weight:600;min-height:36px;}
.btn-ambar:hover{background:var(--ambar-dark);}
.btn-outline{background:#1a1a1a;color:var(--texto);border:2px solid #333;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:.79rem;font-weight:600;min-height:36px;}
.btn-outline:hover{border-color:var(--azul);color:var(--azul-dark);background:#1a0000;}
.tabla-wrap{overflow-x:auto;border-radius:11px;box-shadow:0 1px 4px rgba(0,0,0,.08);-webkit-overflow-scrolling:touch;}
.tabla{width:100%;border-collapse:collapse;background:#111;min-width:750px;}
.tabla thead tr.th1 th{background:#000;color:#fff;padding:10px 11px;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #cc0000;}
.tabla thead tr.th1 th.sem-h{text-align:center;min-width:145px;}
.tabla thead tr.th2 th{background:#0d0d0d;color:#666;padding:5px 11px;font-size:.7rem;font-weight:600;text-align:center;border-bottom:1px solid #222;}
.tabla thead tr.th2 th.info-c{text-align:left;}
.tabla td{padding:11px 11px;border-bottom:1px solid #1e1e1e;font-size:.875rem;vertical-align:middle;}
.tabla tbody tr:last-child td{border-bottom:none;}
.tabla tbody tr:hover td{background:#1a1a1a;}
.tabla tfoot td{padding:8px 11px;font-weight:700;font-size:.8rem;background:#000;border-top:2px solid #cc0000;text-align:center;color:#cc0000;}
.nombre-wrap{display:flex;align-items:center;gap:5px;}
.btn-edit-n{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:.85rem;padding:2px 4px;border-radius:4px;min-height:36px;min-width:36px;display:flex;align-items:center;justify-content:center;}
.btn-edit-n:hover{color:var(--azul);background:var(--azul-bg);}
.celda-pago{display:flex;flex-direction:column;align-items:stretch;gap:4px;}
.pago-row-top{display:flex;align-items:center;gap:4px;}
.pago-btn{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;border:2px solid;cursor:pointer;font-size:.78rem;font-weight:700;transition:all .18s;flex:1;min-height:40px;}
.pago-btn.pendiente{background:var(--rojo-bg);border-color:var(--rojo);color:var(--rojo-dark);}
.pago-btn.recogida{background:var(--ambar-bg);border-color:var(--ambar);color:var(--ambar-dark);}
.pago-btn.contabilizada{background:var(--verde-bg);border-color:var(--verde);color:var(--verde-dark);}
.pago-btn:hover{filter:brightness(.93);transform:scale(1.02);}
.btn-del-pago{background:var(--rojo-bg);border:1.5px solid var(--rojo);color:var(--rojo-dark);border-radius:6px;width:28px;height:36px;cursor:pointer;font-size:.75rem;font-weight:700;flex-shrink:0;transition:all .15s;}
.btn-del-pago:hover{background:var(--rojo);color:#fff;}
.prog-mini{height:3px;border-radius:2px;background:#2a2a2a;overflow:hidden;margin-top:2px;}
.prog-mini-fill{height:100%;border-radius:2px;transition:width .3s;}
.prog-mini-fill.recogida{background:var(--ambar);}
.prog-mini-fill.contabilizada{background:var(--verde);}
.nota-display{font-size:.66rem;color:var(--suave);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px;}
.sem-disabled{opacity:.35;pointer-events:none;}
.sem-toggle-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:.7rem;opacity:.65;margin-left:4px;}
.sem-toggle-btn:hover{opacity:1;}
.reserva-tag{background:var(--ambar-bg);color:var(--ambar-dark);padding:2px 7px;border-radius:10px;font-size:.7rem;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid rgba(245,158,11,.3);}
.reserva-tag:hover{background:rgba(245,158,11,.25);}
.btn-add-reserva{background:none;border:1.5px dashed #94a3b8;color:#94a3b8;border-radius:8px;padding:2px 7px;cursor:pointer;font-size:.7rem;}
.btn-add-reserva:hover{border-color:var(--ambar);color:var(--ambar-dark);}
.resumen-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:14px;}
.res-card{background:#161616;border-radius:10px;padding:12px;text-align:center;box-shadow:0 1px 8px rgba(0,0,0,.5);border:1px solid #2a2a2a;}
.res-card .rl{font-size:.68rem;color:var(--suave);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.res-card .rv{font-size:1.2rem;font-weight:800;color:#fff;}
.alerta-item{background:#161616;border-radius:10px;padding:12px 14px;box-shadow:0 1px 8px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:space-between;border-left:4px solid var(--rojo);margin-bottom:8px;border:1px solid #222;border-left:4px solid var(--rojo);}
.alerta-item.recogida{border-left-color:var(--ambar);border-color:#1c1200;border-left-color:var(--ambar);}
.al-info .al-nom{font-weight:700;font-size:.88rem;}
.al-info .al-sub{font-size:.74rem;color:var(--suave);}
.al-right{display:flex;align-items:center;gap:8px;}
.al-imp{font-size:1rem;font-weight:800;color:var(--rojo-dark);}
.al-imp.recogida{color:var(--ambar-dark);}
.hist-filters{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap;}
.hist-filters select{padding:7px 10px;border:2px solid #2a2a2a;border-radius:8px;font-size:16px;background:#111;color:#f0f0f0;}
.hist-table{width:100%;border-collapse:collapse;background:#111;border-radius:11px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.5);}
.hist-table th{background:#000;color:#fff;padding:10px 12px;text-align:left;font-size:.76rem;font-weight:600;text-transform:uppercase;border-bottom:2px solid #cc0000;}
.hist-table td{padding:10px 12px;border-bottom:1px solid #1e1e1e;font-size:.82rem;}
.hist-table tr:last-child td{border-bottom:none;}
.hist-table tr:hover td{background:#1a1a1a;}
.est-badge{display:inline-block;padding:2px 8px;border-radius:9px;font-size:.7rem;font-weight:700;}
.est-badge.contabilizada{background:var(--verde-bg);color:var(--verde-dark);}
.est-badge.recogida{background:var(--ambar-bg);color:var(--ambar-dark);}
.est-badge.pendiente{background:var(--rojo-bg);color:var(--rojo-dark);}
.anual-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.anual-hdr h2{font-size:1.1rem;font-weight:800;}
.anio-nav{display:flex;align-items:center;gap:8px;}
.anio-nav button{background:#1a1a1a;border:2px solid #333;color:var(--texto);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:.82rem;font-weight:600;}
.anio-nav button:hover{border-color:#cc0000;color:#ff3333;background:#1a0000;}
.anio-lbl{font-size:1.1rem;font-weight:800;min-width:60px;text-align:center;}
.anual-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:20px;}
.anual-table{width:100%;border-collapse:collapse;background:#111;min-width:900px;}
.anual-table th{background:#000;color:#fff;padding:10px 8px;font-size:.74rem;font-weight:700;text-transform:uppercase;text-align:center;border-bottom:2px solid #cc0000;}
.anual-table th.row-lbl{text-align:left;min-width:160px;}
.anual-table td{padding:9px 8px;border-bottom:1px solid #1e1e1e;font-size:.83rem;text-align:center;}
.anual-table td.row-lbl{text-align:left;font-weight:600;color:var(--suave);font-size:.8rem;padding-left:12px;}
.anual-table td.mes-actual{background:rgba(204,0,0,.08);}
.anual-table tr.neto-row td{font-weight:800;font-size:.9rem;background:#0d0d0d;border-top:2px solid #cc0000;}
.anual-table tr.neto-row td.pos{color:var(--verde-dark);}
.anual-table tr.neto-row td.neg{color:var(--rojo-dark);}
.anual-table tr.neto-row td:last-child{background:rgba(34,197,94,.08);}
.anual-table .mes-head{font-size:.72rem;}
.anual-table .mes-head.actual{color:#ff6b6b;}
.gasto-cell{display:flex;flex-direction:column;align-items:center;gap:2px;}
.gasto-sum{font-weight:700;color:var(--rojo-dark);}
.btn-add-gasto{background:none;border:1px dashed #94a3b8;color:#94a3b8;border-radius:5px;padding:1px 5px;cursor:pointer;font-size:.65rem;line-height:1.4;}
.btn-add-gasto:hover{border-color:var(--rojo);color:var(--rojo-dark);}
.gasto-items{font-size:.65rem;color:var(--suave);max-width:80px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;}
.anual-leyenda{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;font-size:.78rem;}
.ley-item{display:flex;align-items:center;gap:5px;}
.ley-dot{width:10px;height:10px;border-radius:50%;}
/* USUARIOS PANEL */
.usr-item{background:#161616;border-radius:11px;padding:14px;box-shadow:0 1px 8px rgba(0,0,0,.5);margin-bottom:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border:1px solid #2a2a2a;}
.usr-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;color:#fff;flex-shrink:0;}
.usr-inf{flex:1;min-width:0;}
.usr-inf .un{font-weight:700;font-size:.95rem;}
.usr-inf .ur{font-size:.73rem;color:var(--suave);margin-top:1px;}
.usr-pchips{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
.upchip{background:var(--azul-bg);color:var(--azul-dark);padding:2px 7px;border-radius:9px;font-size:.67rem;font-weight:600;}
.usr-acts{display:flex;gap:6px;flex-shrink:0;}
.btn-ue{background:var(--azul-bg);color:var(--azul-dark);border:none;border-radius:7px;padding:7px 11px;cursor:pointer;font-size:.78rem;font-weight:600;min-height:36px;}
.btn-ud{background:var(--rojo-bg);color:var(--rojo-dark);border:none;border-radius:7px;padding:7px 11px;cursor:pointer;font-size:.78rem;font-weight:600;min-height:36px;}
.btn-add-usr{background:var(--azul);color:#fff;border:none;border-radius:9px;padding:12px 16px;cursor:pointer;font-size:.88rem;font-weight:700;width:100%;margin-top:6px;min-height:44px;}
.btn-add-usr:hover{background:var(--azul-dark);}
/* MODALES */
.modal-wrap{display:none;position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;}
.modal-wrap.open{display:flex;}
.modal-box{background:#161616;border-radius:16px;padding:20px;width:92%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.8),0 0 0 1px #2a2a2a;max-height:90vh;overflow-y:auto;}
.modal-box h3{font-size:.98rem;font-weight:800;margin-bottom:10px;color:#fff;}
.modal-precio-info{display:flex;align-items:center;justify-content:space-between;background:#111;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:.82rem;border:1px solid #2a2a2a;color:#f0f0f0;}
.precio-tot{font-weight:800;font-size:.92rem;}
.precio-tot.full{color:var(--verde-dark);}
.precio-tot.partial{color:var(--ambar-dark);}
.precio-tot.zero{color:var(--rojo-dark);}
.parciales-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;max-height:200px;overflow-y:auto;}
.parcial-row{display:flex;align-items:center;gap:6px;background:#111;padding:7px 9px;border-radius:8px;border:1px solid #2a2a2a;}
.p-imp{width:80px;padding:6px 7px;border:2px solid #2a2a2a;border-radius:7px;font-size:16px;font-weight:700;text-align:right;background:#111;color:#f0f0f0;}
.p-imp:focus{outline:none;border-color:#cc0000;}
.p-nota{flex:1;padding:6px 7px;border:2px solid #2a2a2a;border-radius:7px;font-size:16px;background:#111;color:#f0f0f0;}
.p-nota:focus{outline:none;border-color:#cc0000;}
.p-del{background:none;border:none;color:var(--rojo);cursor:pointer;font-size:1rem;padding:3px 6px;border-radius:5px;min-height:36px;}
.p-del:hover{background:var(--rojo-bg);}
.parciales-empty{text-align:center;padding:12px;color:var(--suave);font-size:.82rem;border:2px dashed #2a2a2a;border-radius:8px;}
.btn-add-parcial{width:100%;background:var(--azul-bg);color:var(--azul-dark);border:2px dashed var(--azul);border-radius:8px;padding:8px;cursor:pointer;font-size:.82rem;font-weight:600;margin-bottom:10px;min-height:40px;}
.btn-add-parcial:hover{background:var(--azul);color:#fff;}
.chk-row{display:flex;align-items:center;gap:8px;padding:8px 11px;background:#111;border-radius:8px;margin-bottom:10px;cursor:pointer;user-select:none;border:1px solid #2a2a2a;}
.chk-row input{width:16px;height:16px;cursor:pointer;accent-color:var(--verde);}
.chk-row label{font-size:.8rem;font-weight:600;cursor:pointer;color:var(--suave);}
.estado-selector{margin-bottom:12px;}
.estado-selector .lbl-est{font-size:.75rem;color:var(--suave);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.estado-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.est-btn{padding:10px 8px;border-radius:10px;border:2px solid #2a2a2a;background:#1a1a1a;color:var(--texto);cursor:pointer;font-size:.82rem;font-weight:700;transition:all .18s;text-align:center;min-height:44px;}
.est-btn.sel-recogida{background:var(--ambar-bg);border-color:var(--ambar);color:var(--ambar-dark);}
.est-btn.sel-contabilizada{background:var(--verde-bg);border-color:var(--verde);color:var(--verde-dark);}
.mbtns{display:flex;gap:8px;}
.mbtn-ok{flex:1;background:var(--verde);color:#fff;border:none;border-radius:8px;padding:11px;cursor:pointer;font-weight:700;font-size:.9rem;min-height:44px;}
.mbtn-ok:hover{background:var(--verde-dark);}
.mbtn-cancel{flex:1;background:#1e1e1e;color:var(--texto);border:1px solid #333;border-radius:8px;padding:11px;cursor:pointer;font-weight:600;font-size:.9rem;min-height:44px;}
.mbtn-cancel:hover{background:#2a2a2a;}
.modal-sm{background:#161616;border-radius:14px;padding:20px;width:90%;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,.8),0 0 0 1px #2a2a2a;}
.modal-sm h3{font-size:.95rem;font-weight:700;margin-bottom:12px;color:#fff;}
.mf{margin-bottom:11px;}
.mf label{display:block;font-size:.75rem;color:var(--suave);margin-bottom:3px;font-weight:600;}
.mf input,.mf select{width:100%;padding:10px 11px;border:2px solid #2a2a2a;border-radius:8px;font-size:16px;background:#111;color:#f0f0f0;}
.mf input:focus,.mf select:focus{outline:none;border-color:#cc0000;}
.sm-btns{display:flex;gap:7px;flex-wrap:wrap;}
.sm-btns button{flex:1;border-radius:8px;padding:9px 10px;cursor:pointer;font-weight:600;font-size:.83rem;border:none;min-height:40px;}
.btn-ba{background:var(--azul);color:#fff;}
.btn-ba:hover{background:var(--azul-dark);}
.btn-bv{background:#1e1e1e;color:var(--suave);border:1px solid #333;}
.btn-bv:hover{background:var(--rojo-bg);color:var(--rojo-dark);}
.btn-bc{background:#1e1e1e;color:var(--texto);border:1px solid #333;}
.btn-bc:hover{background:#2a2a2a;}
.modal-ge{background:#161616;border-radius:16px;padding:20px;width:92%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.8),0 0 0 1px #2a2a2a;max-height:85vh;overflow-y:auto;}
.modal-ge h3{font-size:.95rem;font-weight:700;margin-bottom:12px;color:#fff;}
.ge-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;max-height:180px;overflow-y:auto;}
.ge-row{display:flex;align-items:center;gap:6px;background:#111;padding:7px 9px;border-radius:8px;border:1px solid #2a2a2a;}
.ge-concepto{flex:1;padding:6px 7px;border:2px solid #2a2a2a;border-radius:7px;font-size:16px;background:#111;color:#f0f0f0;}
.ge-imp{width:80px;padding:6px 7px;border:2px solid #2a2a2a;border-radius:7px;font-size:16px;font-weight:700;text-align:right;background:#111;color:#f0f0f0;}
.ge-del{background:none;border:none;color:var(--rojo);cursor:pointer;font-size:1rem;padding:3px 6px;border-radius:5px;min-height:36px;}
.btn-add-ge{width:100%;background:rgba(204,0,0,.08);color:var(--rojo-dark);border:2px dashed #cc0000;border-radius:8px;padding:8px;cursor:pointer;font-size:.82rem;font-weight:600;margin-bottom:10px;min-height:40px;}
.btn-add-ge:hover{background:rgba(204,0,0,.2);}
.ge-total{text-align:right;font-weight:700;font-size:.85rem;color:var(--rojo-dark);margin-bottom:12px;}
/* MODAL USUARIO */
.modal-usr{background:#161616;border-radius:16px;padding:20px;width:92%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.8),0 0 0 1px #2a2a2a;max-height:92vh;overflow-y:auto;}
.modal-usr h3{font-size:.98rem;font-weight:800;margin-bottom:14px;color:#fff;}
.rol-row{display:flex;gap:10px;margin-top:6px;}
.rol-opt{display:flex;align-items:center;gap:6px;cursor:pointer;background:#111;border-radius:8px;padding:9px 12px;flex:1;border:2px solid #2a2a2a;transition:all .18s;color:#f0f0f0;}
.rol-opt input{width:16px;height:16px;accent-color:var(--azul);}
.rol-opt span{font-size:.83rem;font-weight:600;}
.rol-opt.sel-a{border-color:var(--azul);background:var(--azul-bg);}
.rol-opt.sel-t{border-color:var(--verde);background:var(--verde-bg);}
.pisos-chk-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:6px;}
.piso-chk-lbl{display:flex;align-items:center;gap:6px;background:#111;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:500;border:1px solid #2a2a2a;color:#f0f0f0;}
.piso-chk-lbl input{width:16px;height:16px;accent-color:var(--azul);}
@media(max-width:640px){
  .hdr{flex-direction:column;align-items:flex-start;}
  .main{padding:8px;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .pisos-grid{grid-template-columns:1fr;}
  .modal-wrap{align-items:flex-end;}
  .modal-box,.modal-sm,.modal-ge,.modal-usr{width:100%;max-width:100%;border-radius:20px 20px 0 0;padding:20px 16px 32px;}
  .piso-vhdr{flex-direction:column;}
  .btns-row{width:100%;}
  .btns-row button{flex:1;}
  .resumen-row{grid-template-columns:1fr 1fr;}
  .tabla-wrap::after{content:'← desliza para ver semanas →';display:block;text-align:center;font-size:.68rem;color:#555;padding:4px;background:#0d0d0d;border-bottom-left-radius:11px;border-bottom-right-radius:11px;}
  .anual-wrap::after{content:'← desliza →';display:block;text-align:center;font-size:.68rem;color:#555;padding:4px;background:#0d0d0d;}
  .pisos-chk-grid{grid-template-columns:1fr;}
}

// KEYS
function pk(a,m,pid,h,s){return a+'-'+m+'-'+pid+'-'+h+'-'+s;}
function sk(a,m,pid,s){return a+'-'+m+'-'+pid+'-'+s;}
function hk(pid,h){return pid+'-'+h;}
function gk(a,m){return a+'-'+m;}

// GETTERS
function getNombre(pid,hIdx){var k=hk(pid,hIdx);return k in nombres?nombres[k]:PISOS[pid].habs[hIdx].n;}
function isVacia(pid,hIdx){var k=hk(pid,hIdx);return k in nombres&&nombres[k]==='';}
function getReserva(pid,hIdx){var k=hk(pid,hIdx);return k in reservas?reservas[k]:PISOS[pid].habs[hIdx].r;}
function isSemActiva(a,m,pid,s){var k=sk(a,m,pid,s);return k in semsAct?semsAct[k]:s<4;}
function getPagoData(a,m,pid,h,s){return pagos[pk(a,m,pid,h,s)]||{parciales:[],done:false,estado:'recogida'};}
function getTot(data){return data.parciales.reduce(function(t,p){return t+(parseFloat(p.imp)||0);},0);}
function getGastosExtraMes(a,m){return gastosExtra[gk(a,m)]||[];}
function gkp(a,m,pid){return a+'-'+m+'-'+pid;}
function getGastosExtraPiso(a,m,pid){return gastosExtra[gkp(a,m,pid)]||[];}
function sumGastosExtraPiso(a,m,pid){return getGastosExtraPiso(a,m,pid).reduce(function(t,g){return t+(g.confirmado!==false?parseFloat(g.imp)||0:0);},0);}
function sumGastosExtra(a,m){return PISOS.reduce(function(t,p){return t+sumGastosExtraPiso(a,m,p.id);},0)+getGastosExtraMes(a,m).reduce(function(t,g){return t+(parseFloat(g.imp)||0);},0);}

// CALCULOS
function calcPiso(pid,a,m){
  var piso=PISOS[pid],contab=0,recog=0,pendiente=0,esperado=0;
  piso.habs.forEach(function(hab,hIdx){
    if(isVacia(pid,hIdx)) return;
    for(var s=0;s<5;s++){
      if(!isSemActiva(a,m,pid,s)) continue;
      esperado+=hab.p;
      var data=getPagoData(a,m,pid,hIdx,s);
      var tot=getTot(data);
      var est=data.parciales.length===0&&!data.done?'pendiente':data.estado||'recogida';
      if(est==='contabilizada') contab+=tot>0?tot:hab.p;
      else if(est==='recogida'&&(tot>0||data.done)) recog+=tot>0?tot:hab.p;
      else pendiente+=hab.p;
    }
  });
  var gastosEx=sumGastosExtraPiso(a,m,pid);
  return{contab:contab,recog:recog,pendiente:pendiente,esperado:esperado,gastosEx:gastosEx};
}
function calcAnualMes(a,m){
  var contab=0,recog=0,gastosFijos=0,gastosEx=sumGastosExtra(a,m);
  PISOS.forEach(function(p){
    var activo=!p.desde||(a>p.desde.anio||(a===p.desde.anio&&m>=p.desde.mes));
    var c=calcPiso(p.id,a,m);contab+=c.contab;recog+=c.recog;
    if(activo)gastosFijos+=p.gastos;
  });
  return{contab:contab,recog:recog,gastosFijos:gastosFijos,gastosEx:gastosEx,neto:contab-gastosFijos-gastosEx};
}

      +'<input class="ge-concepto" type="text" value="'+(g.concepto||'')+'" placeholder="Reparación..." '+(canEdit?'oninput="geEdit['+i+'].concepto=this.value"':'readonly style="opacity:.6"')+'>'
      +'<input class="ge-imp" type="number" value="'+(g.imp||'')+'" min="0" placeholder="€" '+(canEdit?'oninput="geEdit['+i+'].imp=parseFloat(this.value)||0;actualizarGeTot()"':'readonly style="opacity:.6;width:70px"')+' style="width:70px">'

function guardarGastos(){
  var ctx=modalCtx;
  var k=ctx.pid!==null&&ctx.pid!==undefined?gkp(ctx.a,ctx.m,ctx.pid):gk(ctx.a,ctx.m);
  var existing=gastosExtra[k]||[];
  var newItems=geEdit.filter(function(g){return (parseFloat(g.imp)||0)>0;}).map(function(g){
    return {concepto:g.concepto,imp:g.imp,confirmado:esAdmin()?g.confirmado!==false:false,autor:g.autor||usuarioActual.id};
  });
  if(esAdmin()){
    gastosExtra[k]=newItems;
  } else {
    var othersItems=existing.filter(function(g){return g.autor!==usuarioActual.id;});
    gastosExtra[k]=othersItems.concat(newItems);
  }
  if(!gastosExtra[k]||gastosExtra[k].length===0){delete gastosExtra[k];}
  sv('crm4_gastos',gastosExtra);cerrarModal('ge');renderAnual();
  if(ctx.pid!==null&&ctx.pid!==undefined){renderPisoView(ctx.pid);}renderDashboard();
}

function guardarUsuario(){
  var nombre=document.getElementById('mu-nombre').value.trim();
  var pin=document.getElementById('mu-pin').value.trim();
  if(!nombre){alert('El nombre es obligatorio.');return;}
  if(pin.length<4){alert('El PIN debe tener al menos 4 dígitos.');return;}
  var rol=document.getElementById('mu-rol-admin').checked?'admin':'trabajadora';
  var pisos=[];
  if(rol==='admin'){pisos=TODOS_PISOS.slice();}
  else{PISOS.forEach(function(p){var chk=document.getElementById('mup-'+p.id);if(chk&&chk.checked)pisos.push(p.id);});}
  if(_uEditId){
    var u=getU(_uEditId);
    if(u){u.nombre=nombre;u.pin=pin;u.rol=rol;u.pisos=pisos;}
    if(usuarioActual&&usuarioActual.id===_uEditId){
      usuarioActual=u;guardarSesion(u);
      document.getElementById('hdr-unom').textContent=u.nombre+(u.rol==='admin'?' 👑':'');
    }
  } else {
    usuarios.push({id:'u'+Date.now(),nombre:nombre,pin:pin,rol:rol,pisos:pisos});
  }
  svU();cerrarModal('usr');renderUsuarios();
}
function eliminarUsuario(uid){
  var u=getU(uid);if(!u) return;
  var admins=0;for(var i=0;i<usuarios.length;i++){if(usuarios[i].rol==='admin')admins++;}
  if(u.rol==='admin'&&admins<=1){alert('No puedes eliminar el único administrador.');return;}
  if(!confirm('¿Eliminar "'+u.nombre+'"?')) return;
  for(var j=0;j<usuarios.length;j++){if(usuarios[j].id===uid){usuarios.splice(j,1);break;}}
  svU();renderUsuarios();
}

// DASHBOARD
function renderDashboard(){
  var totContab=0,totRecog=0,totPend=0,cContab=0,cRecog=0,cPend=0;
  PISOS.forEach(function(p){
    var c=calcPiso(p.id,anioActual,mesActual);
    totContab+=c.contab;totRecog+=c.recog;totPend+=c.pendiente;
    p.habs.forEach(function(hab,hIdx){
      if(isVacia(p.id,hIdx)) return;
      for(var s=0;s<5;s++){
        if(!isSemActiva(anioActual,mesActual,p.id,s)) continue;
        var data=getPagoData(anioActual,mesActual,p.id,hIdx,s);
        var tot=getTot(data);
        var est=data.parciales.length===0&&!data.done?'pendiente':data.estado||'recogida';
        if(est==='contabilizada') cContab++;
        else if(est==='recogida'&&(tot>0||data.done)) cRecog++;
        else cPend++;
      }
    });
  });
  var pct=totContab+totRecog+totPend>0?Math.round(totContab/(totContab+totRecog+totPend)*100):0;
  var miNeto=0,netoSocios=0,pisosSocio=0;
  var gastosPendientes=[];
  PISOS.forEach(function(p){
    var gp=getGastosExtraPiso(anioActual,mesActual,p.id);
    gp.forEach(function(g){if(g.confirmado===false){gastosPendientes.push({piso:p.nombre,concepto:g.concepto,imp:g.imp,autor:g.autor});}});
  });
  PISOS.forEach(function(p){
    var activo=!p.desde||(anioActual>p.desde.anio||(anioActual===p.desde.anio&&mesActual>=p.desde.mes));
    if(!activo) return;
    var c2=calcPiso(p.id,anioActual,mesActual);
    var neto=c2.contab-p.gastos-c2.gastosEx;
    var socio=getSocioPiso(p.id);
    if(socio){miNeto+=neto*0.5;netoSocios+=neto*0.5;pisosSocio++;}
    else{miNeto+=neto;}
  });
  miNeto=Math.round(miNeto*100)/100;
  netoSocios=Math.round(netoSocios*100)/100;
  var el=document.getElementById('view-dashboard');if(!el) return;
  el.innerHTML='<div class="stats-grid">'
    +'<div class="stat v"><div class="lbl">✅ Contabilizado</div><div class="val" style="color:var(--verde-dark)">€'+totContab.toLocaleString()+'</div><div class="sub">'+cContab+' semanas confirmadas</div></div>'
    +'<div class="stat a"><div class="lbl">📦 Recogido (pdte.)</div><div class="val" style="color:var(--ambar-dark)">€'+totRecog.toLocaleString()+'</div><div class="sub">'+cRecog+' sem. por contabilizar</div></div>'
    +'<div class="stat r"><div class="lbl">✗ Sin cobrar</div><div class="val" style="color:var(--rojo-dark)">€'+totPend.toLocaleString()+'</div><div class="sub">'+cPend+' semanas pendientes</div></div>'
    +'<div class="stat"><div class="lbl">% Contabilizado</div><div class="val" style="color:var(--azul-dark)">'+pct+'%</div><div class="sub">del total esperado</div></div>'
    +(pisosSocio>0?'<div class="stat v" style="border-left-color:#cc0000;"><div class="lbl">💰 Tu beneficio neto</div><div class="val" style="color:var(--verde-dark)">€'+miNeto.toLocaleString()+'</div><div class="sub">tras reparto 50/50 en '+pisosSocio+' piso'+(pisosSocio>1?'s':'')+'</div></div>':'')
    +(gastosPendientes.length>0?'<div class="stat a" style="border-left-color:var(--ambar);cursor:pointer;"><div class="lbl">⏳ Gastos por confirmar</div><div class="val" style="color:var(--ambar-dark)">'+gastosPendientes.length+'</div><div class="sub">'+gastosPendientes.map(function(g){return g.piso.split(' ')[0]+': €'+g.imp;}).join(' · ')+'</div></div>':'')
    +'</div>'
    +'<div class="pisos-grid">'+PISOS.map(function(p){
      var c=calcPiso(p.id,anioActual,mesActual);
      var pct2=c.esperado>0?Math.round((c.contab+c.recog)/c.esperado*100):0;
      var chips=p.habs.map(function(h,hIdx){
        if(isVacia(p.id,hIdx)) return '<div class="chip v">VACÍA</div>';
        var nombre=getNombre(p.id,hIdx).split(' ')[0];
        var tieneContab=false,tieneRecog=false;
        for(var s=0;s<5;s++){
          if(!isSemActiva(anioActual,mesActual,p.id,s)) continue;

        +'<div class="chips">'+chips+'</div>'
        +'<div class="piso-footer"><span style="color:var(--verde-dark);font-weight:700">✅ €'+c.contab.toLocaleString()+'</span>'
        +(c.recog>0?'<span style="color:var(--ambar-dark)">📦 €'+c.recog.toLocaleString()+'</span>':'')
        +(c.pendiente>0?'<span style="color:var(--rojo-dark)">✗ €'+c.pendiente.toLocaleString()+'</span>':'')
        +'</div></div>';
    }).join('')+'</div>';
}

function marcarPisoRecogido(pid){
  var piso=PISOS[pid];
  piso.habs.forEach(function(hab,hIdx){
    if(isVacia(pid,hIdx)) return;
    for(var s=0;s<5;s++){
      if(!isSemActiva(anioActual,mesActual,pid,s)) continue;
      var data=getPagoData(anioActual,mesActual,pid,hIdx,s);
      var est=data.parciales.length===0&&!data.done?'pendiente':data.estado||'recogida';
      if(est==='pendiente'){pagos[pk(anioActual,mesActual,pid,hIdx,s)]={parciales:[{imp:hab.p,nota:''}],done:false,estado:'recogida'};}
    }
  });
  sv('crm4_pagos',pagos);renderAll();
}
function marcarPisoContab(pid){
  if(!esAdmin()) return;
  var piso=PISOS[pid];
  piso.habs.forEach(function(hab,hIdx){
    if(isVacia(pid,hIdx)) return;
    for(var s=0;s<5;s++){
      if(!isSemActiva(anioActual,mesActual,pid,s)) continue;
      var data=getPagoData(anioActual,mesActual,pid,hIdx,s);
      if(data.parciales.length===0&&!data.done){data={parciales:[{imp:hab.p,nota:''}],done:false};}
      data.estado='contabilizada';pagos[pk(anioActual,mesActual,pid,hIdx,s)]=data;
    }

}

function limpiarMes(pid){
  if(!esAdmin()) return;

  var thMeses='<th class="mes-head row-lbl">Concepto</th>';
  for(var m=0;m<12;m++){var esMesHoy=m===mesHoy&&anioAnual===anioHoy;thMeses+='<th class="mes-head'+(esMesHoy?' actual':'')+'">'+MESES_CORTO[m]+(esMesHoy?' ★':'')+'</th>';}
  thMeses+='<th class="mes-head">TOTAL</th>';
  var rows={contab:new Array(12).fill(0),recog:new Array(12).fill(0),gastosFijos:new Array(12).fill(0),gastosEx:new Array(12).fill(0),neto:new Array(12).fill(0)};
  for(var m2=0;m2<12;m2++){var d=calcAnualMes(anioAnual,m2);rows.contab[m2]=d.contab;rows.recog[m2]=d.recog;rows.gastosFijos[m2]=d.gastosFijos;rows.gastosEx[m2]=d.gastosEx;rows.neto[m2]=d.neto;}
  function tot(arr){return arr.reduce(function(a,b){return a+b;},0);}
  function fmtV(v){return v===0?'—':'€'+Math.abs(v).toLocaleString();}
  function tdM(val,m3,cls){var eM=m3===mesHoy&&anioAnual===anioHoy;return '<td class="'+(eM?'mes-actual':'')+(cls?' '+cls:'')+'">'+fmtV(val)+'</td>';}
  var rC='<tr><td class="row-lbl">✅ Contabilizado</td>'+rows.contab.map(function(v,m3){return tdM(v,m3,'');}).join('')+'<td style="font-weight:700;color:var(--verde-dark)">€'+tot(rows.contab).toLocaleString()+'</td></tr>';
  var rR='<tr><td class="row-lbl">📦 Recogido (pdte.)</td>'+rows.recog.map(function(v,m3){return tdM(v,m3,'');}).join('')+'<td style="font-weight:700;color:var(--ambar-dark)">€'+tot(rows.recog).toLocaleString()+'</td></tr>';
  var rGF='<tr><td class="row-lbl">🏠 Gastos fijos</td>'+rows.gastosFijos.map(function(v,m3){return tdM(v,m3,'');}).join('')+'<td style="font-weight:700;color:var(--rojo-dark)">€'+tot(rows.gastosFijos).toLocaleString()+'</td></tr>';
  var rGE='<tr><td class="row-lbl">💸 Gastos extra</td>'+rows.gastosEx.map(function(v,m3){
    var eM=m3===mesHoy&&anioAnual===anioHoy;var ge=getGastosExtraMes(anioAnual,m3);
    var cell='<div class="gasto-cell">';
    if(v>0) cell+='<span class="gasto-sum">€'+v+'</span>';
    if(ge.length>0){cell+='<span class="gasto-items">'+ge.slice(0,2).map(function(g){return g.concepto||'Gasto';}).join(', ')+(ge.length>2?'...':'')+'</span>';}
    cell+='<button class="btn-add-gasto" onclick="abrirModalGe('+anioAnual+','+m3+')">+ gasto</button></div>';
    return '<td class="'+(eM?'mes-actual':'')+'" style="min-width:100px;">'+cell+'</td>';
  }).join('')+'<td style="font-weight:700;color:var(--rojo-dark)">€'+tot(rows.gastosEx).toLocaleString()+'</td></tr>';
  var rN='<tr class="neto-row"><td class="row-lbl" style="font-weight:800;">💰 NETO</td>'+rows.neto.map(function(v,m3){var eM=m3===mesHoy&&anioAnual===anioHoy;return '<td class="'+(eM?'mes-actual ':'')+(v>=0?'pos':'neg')+'" style="font-weight:800;">'+(v===0?'—':(v>=0?'+':'')+'€'+v.toLocaleString())+'</td>';}).join('')+'<td class="'+(tot(rows.neto)>=0?'pos':'neg')+'" style="font-weight:800;">'+(tot(rows.neto)>=0?'+':'')+'€'+tot(rows.neto).toLocaleString()+'</td></tr>';
  el.innerHTML='<div class="anual-hdr"><h2>📈 Resumen anual contable</h2><div class="anio-nav"><button onclick="cambiarAnio(-1)">◀</button><div class="anio-lbl">'+anioAnual+'</div><button onclick="cambiarAnio(1)">▶</button></div></div>'
    +'<div class="anual-leyenda"><div class="ley-item"><div class="ley-dot" style="background:var(--verde)"></div> Contabilizado</div><div class="ley-item"><div class="ley-dot" style="background:var(--ambar)"></div> Recogido</div><div class="ley-item"><div class="ley-dot" style="background:var(--rojo)"></div> Gastos</div></div>'
    +'<div class="anual-wrap"><table class="anual-table"><thead><tr>'+thMeses+'</tr></thead><tbody>'+rC+rR+rGF+rGE+rN+'</tbody></table></div>'
    +'<div style="font-size:.75rem;color:var(--suave);padding:8px 12px;background:var(--gris-bg);border-radius:8px;">⚠️ El neto usa solo lo <strong>Contabilizado</strong>. Clic en "+ gasto" para añadir gastos extra.</div>';
}

// HISTORIAL
function renderHistorial(){
  var fp=document.getElementById('filtro-piso');var fe=document.getElementById('filtro-estado');
  var fpv=fp?fp.value:'';var fev=fe?fe.value:'';
  var rows='';
  Object.keys(pagos).sort().reverse().forEach(function(k){
    var pts=k.split('-');if(pts.length!==5) return;
    var a=parseInt(pts[0]),m=parseInt(pts[1]),pid=parseInt(pts[2]),hIdx=parseInt(pts[3]),sIdx=parseInt(pts[4]);
    var piso=PISOS[pid];if(!piso) return;var hab=piso.habs[hIdx];if(!hab) return;
    var data=pagos[k];var tot=getTot(data);
    var est=data.parciales.length===0&&!data.done?'pendiente':data.estado||'recogida';
    var nombre=getNombre(pid,hIdx);
    if(fpv&&String(pid)!==fpv) return;if(fev&&est!==fev) return;
    var notas=data.parciales.filter(function(p){return p.nota;}).map(function(p){return '€'+p.imp+'/'+p.nota;}).join(', ');
    rows+='<tr><td>'+MESES[m]+' '+a+' · Sem.'+(sIdx+1)+'</td><td>'+piso.nombre+'</td><td><strong>'+nombre+'</strong></td><td style="font-weight:700;color:var(--azul-dark)">€'+tot+'</td><td><span class="est-badge '+est+'">'+(est==='contabilizada'?'✅ Contabilizada':est==='recogida'?'📦 Recogida':'✗ Pendiente')+'</span></td><td style="color:var(--suave);font-size:.77rem">'+notas+'</td></tr>';
  });
  var tbody=document.getElementById('hist-tbody');
  if(tbody) tbody.innerHTML=rows||'<tr><td colspan="6" style="text-align:center;padding:22px;color:var(--suave)">Sin registros.</td></tr>';
}

// USUARIOS PANEL
function renderUsuarios(){
  var el=document.getElementById('view-usuarios');if(!el) return;
  var items=usuarios.map(function(u,i){
    var col=UCOLORS[i%UCOLORS.length];
    var ini=u.nombre.charAt(0).toUpperCase();
    var pisosHtml=u.rol==='admin'
      ?'<span style="color:var(--suave);font-size:.72rem">Acceso completo a todos los pisos</span>'
      :(u.pisos.length===0?'<span style="color:var(--rojo);font-size:.72rem">Sin pisos asignados</span>':u.pisos.map(function(pid){return '<span class="upchip">'+PISOS[pid].nombre.split(' ').slice(0,2).join(' ')+'</span>';}).join(''));
    var admins=0;for(var j=0;j<usuarios.length;j++){if(usuarios[j].rol==='admin')admins++;}
    var canDel=!(u.rol==='admin'&&admins<=1);
    return '<div class="usr-item"><div class="usr-av" style="background:'+col+'">'+ini+'</div>'
      +'<div class="usr-inf"><div class="un">'+u.nombre+'</div><div class="ur">'+(u.rol==='admin'?'👑 Administrador':'👤 Socio colaborador')+'</div><div class="usr-pchips">'+pisosHtml+'</div></div>'
      +'<div class="usr-acts"><button class="btn-ue" onclick="abrirModalUsuario(\''+u.id+'\')">✏ Editar</button>'+(canDel?'<button class="btn-ud" onclick="eliminarUsuario(\''+u.id+'\')">✕</button>':'')+'</div></div>';
  }).join('');
  el.innerHTML='<h2 style="margin-bottom:4px;font-size:1.05rem;">👥 Gestión de usuarios</h2>'
    +'<p style="font-size:.78rem;color:var(--suave);margin-bottom:16px;">Crea usuarios para tu socia y asígnales los pisos. El PIN por defecto del admin es <strong>1111</strong> — cámbialo.</p>'
    +items
    +'<button class="btn-add-usr" onclick="abrirModalUsuario(null)">+ Añadir usuario</button>';
}

// BADGES
function actualizarBadges(){
  PISOS.forEach(function(p){
    var tab=document.getElementById('tab-piso-'+p.id);
    if(!tab||tab.style.display==='none') return;
    var nRecog=0,nPend=0;
    p.habs.forEach(function(hab,hIdx){
      if(isVacia(p.id,hIdx)) return;
      for(var s=0;s<5;s++){
        if(!isSemActiva(anioActual,mesActual,p.id,s)) continue;
        var data=getPagoData(anioActual,mesActual,p.id,hIdx,s);
        var tot=getTot(data);
        var est=data.parciales.length===0&&!data.done?'pendiente':data.estado||'recogida';
        if(est==='recogida'&&(tot>0||data.done)) nRecog++;
        else if(est==='pendiente') nPend++;
      }
    });
    var lbl=p.nombre.split(' ').slice(0,2).join(' ');
    tab.innerHTML=lbl+(nPend>0?'<span class="badge r">'+nPend+'</span>':'')+(nRecog>0?'<span class="badge a">'+nRecog+'</span>':'')+(nPend===0&&nRecog===0?'<span class="badge v">✓</span>':'');
  });
  if(!esAdmin()) return;
  var totPend=0,totRecog=0;
  PISOS.forEach(function(p){p.habs.forEach(function(hab,hIdx){
    if(isVacia(p.id,hIdx)) return;
    for(var s=0;s<5;s++){
      if(!isSemActiva(anioActual,mesActual,p.id,s)) continue;
      var data=getPagoData(anioActual,mesActual,p.id,hIdx,s);
      var tot=getTot(data);
      var est=data.parciales.length===0&&!data.done?'pendiente':data.estado||'recogida';
      if(est==='pendiente') totPend++;
      else if(est==='recogida'&&(tot>0||data.done)) totRecog++;
    }
  });});
  var tabAl=document.getElementById('tab-alertas');
  if(tabAl) tabAl.innerHTML='🚨 Alertas'+(totPend>0?'<span class="badge r">'+totPend+'</span>':'')+(totRecog>0?'<span class="badge a">'+totRecog+'</span>':'');
}

// NAVEGACIÓN VISTAS
function mostrarVista(nombre){
  if(esTrab()){
    var soloAdmin=['dashboard','anual','historial','usuarios'];
    for(var i=0;i<soloAdmin.length;i++){if(soloAdmin[i]===nombre) return;}
    if(nombre.indexOf('piso-')===0){var pid=parseInt(nombre.replace('piso-',''));if(!tienePiso(pid)) return;}
  }
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  var v=document.getElementById('view-'+nombre);var t=document.getElementById('tab-'+nombre);
  if(v) v.classList.add('active');if(t) t.classList.add('active');
  if(nombre==='historial') renderHistorial();
  if(nombre==='anual'){anioAnual=anioActual;renderAnual();}
  if(nombre==='usuarios') renderUsuarios();
}

// INIT
function init(){
  var main=document.getElementById('main-content');
  var tabs=document.getElementById('tabs-container');
  var alertaTab=document.getElementById('tab-alertas');
  var dvD=document.createElement('div');dvD.className='view active';dvD.id='view-dashboard';main.appendChild(dvD);
  PISOS.forEach(function(p){
    var tab=document.createElement('div');tab.className='tab';tab.id='tab-piso-'+p.id;
    tab.textContent=p.nombre;tab.onclick=(function(id){return function(){mostrarVista('piso-'+id);};})(p.id);
    tabs.insertBefore(tab,alertaTab);
    var dv=document.createElement('div');dv.className='view';dv.id='view-piso-'+p.id;main.appendChild(dv);
  });
  var dvAl=document.createElement('div');dvAl.className='view';dvAl.id='view-alertas';main.appendChild(dvAl);
  var dvAn=document.createElement('div');dvAn.className='view';dvAn.id='view-anual';main.appendChild(dvAn);
  var dvH=document.createElement('div');dvH.className='view';dvH.id='view-historial';
  dvH.innerHTML='<h2 style="margin-bottom:13px;font-size:1.05rem;">📋 Historial de pagos</h2>'
    +'<div class="hist-filters"><select id="filtro-piso" onchange="renderHistorial()" style="font-size:16px"><option value="">Todos los pisos</option>'+PISOS.map(function(p){return '<option value="'+p.id+'">'+p.nombre+'</option>';}).join('')+'</select>'
    +'<select id="filtro-estado" onchange="renderHistorial()" style="font-size:16px"><option value="">Todos los estados</option><option value="contabilizada">✅ Contabilizada</option><option value="recogida">📦 Recogida</option></select></div>'
    +'<table class="hist-table"><thead><tr><th>Mes/Sem.</th><th>Piso</th><th>Inquilina</th><th>Total</th><th>Estado</th><th>Notas</th></tr></thead><tbody id="hist-tbody"></tbody></table>';
  main.appendChild(dvH);
  var dvU=document.createElement('div');dvU.className='view';dvU.id='view-usuarios';main.appendChild(dvU);
  if(checkSesion()){arrancarApp();}else{mostrarLogin();}
}

window.onload=function(){
  try{
    ['modal-pago-wrap','modal-nombre-wrap','modal-reserva-wrap','modal-ge-wrap','modal-usr-wrap'].forEach(function(id){
      var el=document.getElementById(id);
      if(el) el.addEventListener('click',function(e){if(e.target===e.currentTarget)cerrarModal();});
    });
    document.addEventListener('keydown',function(e){if(e.key==='Escape')cerrarModal();});
    init();
  }catch(e){
    var m=document.getElementById('main-content');
    if(m) m.innerHTML='<div style="padding:24px;background:#1a0000;border:1px solid #cc0000;border-radius:12px;margin:16px;font-size:15px;color:#f0f0f0"><strong>Error al iniciar</strong><br><small>'+(e.message||e)+'</small><br><br><button onclick="location.reload()" style="padding:12px 20px;background:#cc0000;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer">Reintentar</button></div>';
  }
};
